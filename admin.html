<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin - ArtSango</title>
  <style>
    body{ margin:0; font-family:Verdana,sans-serif; background:#efe7d9; color:#111827; }
    .wrap{ max-width:980px; margin:0 auto; padding:20px; padding-bottom:calc(20px + env(safe-area-inset-bottom)); }
    .card{ background:#fff; border:1px solid #e0d2be; border-radius:12px; padding:14px; margin-bottom:12px; }
    h1{ margin-top:0; }
    .row{ display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .tag{ font-size:.75rem; font-weight:700; padding:5px 8px; border-radius:999px; background:#fef3c7; color:#92400e; }
    button{ border:0; background:#0f766e; color:#fff; font-weight:800; border-radius:8px; padding:8px 11px; cursor:pointer; }
    .back-btn{ border:0; border-radius:999px; padding:10px 14px; font-weight:800; cursor:pointer; background:#0f766e; color:#fff; margin-bottom:10px; }
    @media (max-width:700px){ .row{ flex-direction:column; align-items:flex-start; } }
  </style>
</head>
<body>
  <div class="wrap">
    <button class="back-btn" type="button" onclick="goBack('dashboard-artisan.html')">← Retour</button>
    <h1>Backoffice ArtSango</h1>
    <article class="card row">
      <div><strong>Atelier Kora</strong><p style="margin:4px 0 0">Demande verification marque</p></div>
      <div><span class="tag">A valider</span> <button>Valider</button></div>
    </article>
    <article class="card row">
      <div><strong>Studio Nia</strong><p style="margin:4px 0 0">Signalement contenu produit</p></div>
      <div><span class="tag">A revoir</span> <button>Traiter</button></div>
    </article>
  </div>
  <script>
    function goBack(fallback) {
      if (window.history.length > 1) window.history.back();
      else window.location.href = fallback;
    }
  </script>
</body>
</html>
