<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Connexion - ArtSango</title>
  <style>
    body { margin:0; font-family:Tahoma, sans-serif; background:#eee5d8; color:#1f2937; }
    .box { max-width:460px; margin:26px auto; background:white; border:1px solid #dfd2bd; border-radius:16px; padding:24px; }
    .wrap { padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
    .back-btn { border:0; background:#0f766e; color:#fff; border-radius:999px; padding:10px 14px; font-weight:800; cursor:pointer; margin-bottom:10px; }
    h1 { margin-top:0; }
    input { width:100%; padding:11px; margin:7px 0 14px; border:1px solid #cdbda4; border-radius:10px; }
    button { width:100%; background:#0f766e; color:#fff; border:0; padding:11px; border-radius:10px; font-weight:800; cursor:pointer; }
    a { color:#0f766e; font-weight:700; text-decoration:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <button class="back-btn" type="button" onclick="goBack('index.html')">← Retour</button>
    <div class="box">
      <h1>Connexion createur</h1>
      <label>Email</label>
      <input type="email" placeholder="email pro">
      <label>Mot de passe</label>
      <input type="password" placeholder="********">
      <button type="button" onclick="location.href='dashboard-artisan.html'">Acceder au dashboard</button>
      <p><a href="inscription-artisan.html">Je cree mon compte</a></p>
    </div>
  </div>
  <script>
    function goBack(fallback) {
      if (window.history.length > 1) window.history.back();
      else window.location.href = fallback;
    }
  </script>
</body>
</html>
